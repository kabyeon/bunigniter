<!-- layout:default -->

<h1>포스트 관리</h1>

<p><a href="/admin/posts/create" class="btn btn-primary">+ 새 포스트</a></p>

<table class="table">
  <thead>
    <tr>
      <th>ID</th>
      <th>제목</th>
      <th>작성자</th>
      <th>상태</th>
      <th>작성일</th>
      <th>작업</th>
    </tr>
  </thead>
  <tbody>
    <? for (const post of posts) { ?>
    <tr>
      <td>{{ post.id }}</td>
      <td>{{ post.title }}</td>
      <td>{{ post.author_name }}</td>
      <td>
        <? if (post.published) { ?>
        <span class="badge badge-published">공개</span>
        <? } else { ?>
        <span class="badge badge-draft">초안</span>
        <? } ?>
      </td>
      <td>{{ post.created_at }}</td>
      <td>
        <a href="/posts/{{ post.slug }}" class="btn btn-sm">보기</a>
        <a href="/admin/posts/{{ post.id }}/edit" class="btn btn-sm">수정</a>
        <form
          method="POST"
          action="/admin/posts/{{ post.id }}"
          style="display: inline"
        >
          <input type="hidden" name="_method" value="DELETE" />
          <button
            type="submit"
            class="btn btn-sm btn-danger"
            onclick="return confirm('삭제하시겠습니까?');"
          >
            삭제
          </button>
        </form>
      </td>
    </tr>
    <? } ?>
  </tbody>
</table>
