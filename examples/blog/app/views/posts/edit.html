<!-- slot:title -->포스트 수정<!-- endslot -->

<h1>포스트 수정</h1>

<form method="POST" action="/admin/posts/{{ post.id }}">
  <input type="hidden" name="_method" value="PUT" />
  <input type="hidden" name="_csrf" value="{{ csrf_token ?? \"\" }}" />
  <div class="form-group">
    <label>제목</label>
    <input type="text" name="title" value="{{ post.title }}" required />
  </div>
  <div class="form-group">
    <label>요약</label>
    <input type="text" name="excerpt" value="{{ post.excerpt }}" />
  </div>
  <div class="form-group">
    <label>내용</label>
    <textarea name="content" rows="15" required>{{ post.content }}</textarea>
  </div>
  <div class="form-group">
    <label>
      <input type="checkbox" name="published" value="1" <? if (post.published) { ?>checked<? } ?> />
      공개
    </label>
  </div>
  <button type="submit" class="btn btn-primary">수정</button>
  <a href="/admin/posts" class="btn">취소</a>
</form>
